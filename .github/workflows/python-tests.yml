name: Python tests

on:
  push:
  pull_request:

jobs:
  pc-app-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pc_app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
